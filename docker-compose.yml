services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - credpal-network
    restart: unless-stopped

  db:
    image: postgres:14
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - credpal-network
    restart: unless-stopped

networks:
  credpal-network:
    driver: bridge
